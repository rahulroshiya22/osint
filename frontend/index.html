<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFO HUB BY RAHUL</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>



    <!-- Animated Hacker Background -->
    <canvas id="matrix-bg"></canvas>

    <!-- ═══════════ INTRO ANIMATION ═══════════ -->
    <div id="intro-screen" class="intro-screen active">
        <div class="intro-content">
            <div class="logo-icon-3d intro-logo">🔥</div>
            <h1 class="intro-title">SYSTEM <span class="accent">INITIALIZING</span></h1>
            <div class="intro-loader"></div>
        </div>
    </div>

    <!-- ═══════════ AUTH SCREENS ═══════════ -->
    <div id="auth-screen" class="screen">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="logo-icon-3d">🔥</div>
                <h1>INFO HUB <span class="accent">BY RAHUL</span></h1>
                <p class="tagline">Restricted Access</p>
            </div>

            <div id="login-form" class="auth-form glass-card">
                <h2>Enter Password</h2>
                <div class="input-group">
                    <input type="password" id="login-password" placeholder="Access Code..."
                        onkeydown="if(event.key==='Enter')verifyPassword()">
                </div>
                <button id="login-btn" class="btn-3d" onclick="verifyPassword()">
                    <span class="btn-text">Unlock</span>
                    <span class="btn-loader hidden"></span>
                </button>
            </div>

            <div id="auth-message" class="auth-message hidden"></div>
        </div>
    </div>

    <!-- ═══════════ PENDING SCREEN ═══════════ -->
    <div id="pending-screen" class="screen">
        <div class="pending-container glass-card">
            <div class="icon-3d pulse">⏳</div>
            <h2>Pending Approval</h2>
            <p>Admin needs to verify your account.</p>
            <button class="btn-3d outline" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <!-- ═══════════ DASHBOARD ═══════════ -->
    <div id="dashboard-screen" class="screen">

        <!-- Top Navigation -->
        <header class="top-nav glass-card">
            <div class="nav-brand">
                <div class="logo-icon-3d small">🔥</div>
                <span class="brand-text">INFO HUB BY RAHUL</span>
            </div>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- ══ Tool Panels ══ -->
            <div id="panel-number_to_info" class="tool-panel active"></div>
        </main>

        <!-- Mobile Bottom Navigation -->
        <nav class="bottom-nav glass-card">
            <div class="nav-tabs" id="nav-tabs">
                <button class="tab-btn active" data-tab="number_to_info" onclick="switchTab('number_to_info')">
                    <div class="icon-3d-text">📱</div>
                    <span>Intel</span>
                </button>
            </div>
            <button class="tab-btn logout-btn" onclick="handleLogout()">
                <div class="icon-3d-text">🚪</div>
                <span>Logout</span>
            </button>
        </nav>
    </div>

    <!-- Toasts -->
    <div id="toast-container" class="toast-container"></div>

    <script src="main.js"></script>
</body>

</html>
