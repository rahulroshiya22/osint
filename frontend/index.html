<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INFO HUB BY RAHUL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Matrix Background -->
    <canvas id="matrix-bg"></canvas>

    <!-- ═══════════ INTRO ═══════════ -->
    <div id="intro-screen" class="intro-screen active">
        <div class="intro-content">
            <div class="intro-logo">🔥</div>
            <h1 class="intro-title">SYSTEM <span class="accent">INITIALIZING</span></h1>
            <div class="intro-loader"></div>
        </div>
    </div>

    <!-- ═══════════ AUTH ═══════════ -->
    <div id="auth-screen" class="screen">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="intro-logo">🔥</div>
                <h1>INFO HUB</h1>
                <p class="tagline">BY RAHUL — Restricted</p>
            </div>

            <div id="login-form" class="auth-form glass-card">
                <h2>ENTER ACCESS CODE</h2>
                <div class="input-group">
                    <input type="password" id="login-password" placeholder="••••••••"
                        onkeydown="if(event.key==='Enter')verifyPassword()">
                </div>
                <button id="login-btn" class="btn-3d" onclick="verifyPassword()">
                    <span class="btn-text">UNLOCK SYSTEM</span>
                    <span class="btn-loader hidden">...</span>
                </button>
            </div>

            <div id="auth-message" class="auth-message hidden"></div>
        </div>
    </div>

    <!-- ═══════════ PENDING ═══════════ -->
    <div id="pending-screen" class="screen">
        <div class="pending-container glass-card" style="padding: 40px; text-align: center;">
            <div class="intro-logo" style="font-size: 3rem;">⏳</div>
            <h2 style="font-family: var(--font-mono); margin: 20px 0;">ACCESS PENDING</h2>
            <p style="color: var(--text-gray); font-size: 0.9rem; margin-bottom: 30px;">Administrator verification required for this terminal.</p>
            <button class="btn-3d outline" onclick="handleLogout()">TERMINATE SESSION</button>
        </div>
    </div>

    <!-- ═══════════ DASHBOARD ═══════════ -->
    <div id="dashboard-screen" class="screen">
        
        <header class="top-nav glass-card">
            <div class="nav-brand">
                <span class="accent">HUB</span>.RAHUL // <span id="user-status">ONLINE</span>
            </div>
            <div class="logo-icon-3d small" style="font-size: 1.2rem;">🔥</div>
        </header>

        <main class="main-content">
            <!-- Tool Panels will be injected here -->
            <div id="panel-number_to_info" class="tool-panel active"></div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-tabs" id="nav-tabs" style="display: flex; gap: 40px;">
                <button class="tab-btn active" data-tab="number_to_info" onclick="switchTab('number_to_info')">
                    <span class="icon-3d-text">📱</span>
                    <span>INTEL</span>
                </button>
            </div>
            <button class="tab-btn" onclick="handleLogout()" style="color: #ff4444;">
                <span class="icon-3d-text">🚪</span>
                <span>EXIT</span>
            </button>
        </nav>
    </div>

    <!-- Toasts -->
    <div id="toast-container" class="toast-container"></div>

    <script src="main.js"></script>
</body>
</html>
